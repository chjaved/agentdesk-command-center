<style>

<body class="bg-background text-text-primary font-body-md antialiased h-screen w-full overflow-hidden flex flex-col">
<!-- TopNavBar (Shared Component) -->
<header class="flex justify-between items-center h-16 px-margin-mobile w-full z-50 bg-surface-container/90 dark:bg-surface-container/90 backdrop-blur-md docked full-width top-0 sticky shadow-[0_4px_24px_-8px_rgba(0,0,0,0.5)]">
<div class="font-headline-md text-headline-md font-bold text-primary dark:text-primary tracking-tight">AgentDesk</div>
<div class="flex items-center gap-4">
<button class="relative hover:opacity-80 transition-opacity active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant">notifications</span>
<span class="absolute top-0 right-0 w-2 h-2 bg-error rounded-full ring-2 ring-surface-container"></span>
</button>
<button class="hover:opacity-80 transition-opacity active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant">schedule</span>
</button>
<button class="hover:opacity-80 transition-opacity active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant">account_circle</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto pb-[100px]">
<!-- Stats Grid Bento -->
<section class="px-margin-mobile mt-6">
<div class="grid grid-cols-2 gap-stack-gap">
<!-- Stat 1 -->
<div class="bg-surface border border-border rounded-xl p-4 flex flex-col justify-between relative overflow-hidden group hover:border-primary/50 transition-colors">
<div class="absolute top-0 right-0 w-16 h-16 bg-primary/5 rounded-bl-full -z-10"></div>
<span class="font-label-mono text-label-mono text-text-muted flex items-center gap-1">
<div class="w-1.5 h-1.5 rounded-full bg-success"></div>
                        ACTIVE
                    </span>
<div class="font-display-lg text-display-lg text-text-primary mt-1">3</div>
</div>
<!-- Stat 2 -->
<div class="bg-surface border border-border rounded-xl p-4 flex flex-col justify-between hover:border-primary/50 transition-colors">
<span class="font-label-mono text-label-mono text-text-muted">MESSAGES</span>
<div class="font-display-lg text-display-lg text-text-primary mt-1">1.2<span class="text-headline-sm text-text-muted">k</span></div>
</div>
<!-- Stat 3 -->
<div class="bg-surface border border-border rounded-xl p-4 flex flex-col justify-between hover:border-primary/50 transition-colors">
<span class="font-label-mono text-label-mono text-text-muted">BOOKINGS</span>
<div class="font-display-lg text-display-lg text-text-primary mt-1">12</div>
</div>
<!-- Stat 4 -->
<div class="bg-surface border border-border rounded-xl p-4 flex flex-col justify-between relative overflow-hidden hover:border-primary/50 transition-colors">
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent -z-10"></div>
<span class="font-label-mono text-label-mono text-primary">SAVED</span>
<div class="font-display-lg text-display-lg text-primary mt-1">47<span class="text-headline-sm">h</span></div>
</div>
</div>
</section>
<!-- Agent Roster Stack -->
<section class="px-margin-mobile mt-8 mb-8">
<div class="flex justify-between items-center mb-4">
<h2 class="font-headline-sm text-headline-sm text-text-primary">Live Agents</h2>
<span class="font-body-sm text-body-sm text-text-muted flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">swipe_left</span> Swipe options
                </span>
</div>
<div class="flex flex-col gap-stack-gap">
<!-- Agent Card 1 -->
<div class="bg-surface border border-border rounded-xl p-4 flex items-center justify-between relative overflow-hidden active:scale-[0.98] transition-transform">
<div class="flex items-center gap-3">
<div class="relative flex h-3 w-3">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-success opacity-75"></span>
<span class="relative inline-flex rounded-full h-3 w-3 bg-success"></span>
</div>
<div>
<h3 class="font-body-md text-body-md font-bold text-text-primary">Sales Outreach</h3>
<p class="font-body-sm text-body-sm text-text-muted font-label-mono mt-0.5">Processing 142 leads...</p>
</div>
</div>
<div class="flex gap-2">
<div class="w-8 h-8 rounded-full bg-surface-bright flex items-center justify-center opacity-50">
<span class="material-symbols-outlined text-[18px]">more_vert</span>
</div>
</div>
</div>
<!-- Agent Card 2 -->
<div class="bg-surface border border-border rounded-xl p-4 flex items-center justify-between relative overflow-hidden active:scale-[0.98] transition-transform">
<div class="flex items-center gap-3">
<div class="relative flex h-3 w-3">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-success opacity-75"></span>
<span class="relative inline-flex rounded-full h-3 w-3 bg-success"></span>
</div>
<div>
<h3 class="font-body-md text-body-md font-bold text-text-primary">Support Bot 01</h3>
<p class="font-body-sm text-body-sm text-text-muted font-label-mono mt-0.5">Handling 3 tickets</p>
</div>
</div>
<div class="flex gap-2">
<div class="w-8 h-8 rounded-full bg-surface-bright flex items-center justify-center opacity-50">
<span class="material-symbols-outlined text-[18px]">more_vert</span>
</div>
</div>
</div>
<!-- Agent Card 3 (Idle) -->
<div class="bg-surface border border-border rounded-xl p-4 flex items-center justify-between relative overflow-hidden opacity-75 active:scale-[0.98] transition-transform">
<div class="flex items-center gap-3">
<div class="relative flex h-3 w-3">
<span class="relative inline-flex rounded-full h-3 w-3 bg-text-muted"></span>
</div>
<div>
<h3 class="font-body-md text-body-md font-bold text-text-primary">Data Scraper</h3>
<p class="font-body-sm text-body-sm text-text-muted font-label-mono mt-0.5">Idle - Schedule met</p>
</div>
</div>
<div class="flex gap-2">
<div class="w-8 h-8 rounded-full bg-surface-bright flex items-center justify-center opacity-50">
<span class="material-symbols-outlined text-[18px]">more_vert</span>
</div>
</div>
</div>
</div>
</section>

</button>

<!-- Active: Home -->
<button class="flex flex-col items-center justify-center text-primary bg-primary-container/20 rounded-xl px-4 py-1.5 scale-95 transition-transform duration-150">
<span class="material-symbols-outlined mb-1 text-[24px]" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-label-caps text-[10px] uppercase tracking-widest font-bold">Home</span>
</button>
<!-- Inactive: Agents -->
<button class="flex flex-col items-center justify-center text-text-muted active:bg-surface-bright transition-colors rounded-xl px-4 py-1.5">
<span class="material-symbols-outlined mb-1 text-[24px]">smart_toy</span>
<span class="font-label-caps text-[10px] uppercase tracking-widest font-bold">Agents</span>
</button>
<!-- Inactive: Stats -->
<button class="flex flex-col items-center justify-center text-text-muted active:bg-surface-bright transition-colors rounded-xl px-4 py-1.5">
<span class="material-symbols-outlined mb-1 text-[24px]">analytics</span>
<span class="font-label-caps text-[10px] uppercase tracking-widest font-bold">Stats</span>
</button>
<!-- Inactive: Alerts -->
<button class="flex flex-col items-center justify-center text-text-muted active:bg-surface-bright transition-colors rounded-xl px-4 py-1.5">
<span class="material-symbols-outlined mb-1 text-[24px]">notifications</span>
<span class="font-label-caps text-[10px] uppercase tracking-widest font-bold">Alerts</span>
</button>
</nav>

<style>
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 16px);
